<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mailtrap test</title>
  </head>
  <body style="margin:0;background:#f4f7fb;font-family:Arial,Helvetica,sans-serif;color:#172033;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f7fb;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #dbe3ef;border-radius:8px;overflow:hidden;">
            <tr>
              <td style="background:#1f6feb;color:#ffffff;padding:24px 28px;">
                <h1 style="font-size:22px;line-height:1.3;margin:0;">Mailtrap test</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                <p style="font-size:16px;line-height:1.6;margin:0 0 16px;">Hallo $recipient_name,</p>
                <p style="font-size:16px;line-height:1.6;margin:0 0 16px;">
                  Dit is een testmail vanuit <strong>$app_name</strong>.
                </p>
                <p style="font-size:16px;line-height:1.6;margin:0 0 24px;">
                  Als je dit bericht in Mailtrap ziet, werkt de SMTP-koppeling goed.
                </p>
                <p style="font-size:13px;line-height:1.5;margin:0;color:#5f6f89;">
                  Applicatieversie: $app_version
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
