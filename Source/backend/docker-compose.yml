services:
  postgres:
    image: postgres:16-alpine
    container_name: exam_tool_postgres
    restart: unless-stopped
    ports:
      - "${PGPORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${PGUSER:-exam_admin}
      POSTGRES_PASSWORD: ${PGPASSWORD:-exam_admin}
      POSTGRES_DB: ${PGDATABASE:-exam_tool}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-exam_admin} -d ${PGDATABASE:-exam_tool}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
